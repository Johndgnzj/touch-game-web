<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRAMAN x MELODY: HEROES</title>
    <link rel="stylesheet" href="css/tailwind.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            background-attachment: fixed;
        }
        .container-box {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
        }
        /* 響應式佈局：橫向模式下縮小間距與 Logo */
        @media (orientation: landscape) {
            .container-box {
                flex-direction: row;
                max-width: 900px;
                gap: 2rem;
                justify-content: center;
            }
            .hero-logo { width: 40vh !important; }
            .content-side { flex: 1; text-align: left; }
            .content-side .h-1 { margin-left: 0; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            width: 100%;
        }
        .hero-logo {
            filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.6));
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .hero-logo:hover {
            transform: scale(1.05) rotate(2deg);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 8px 20px -6px rgba(59, 130, 246, 0.6);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -5px rgba(59, 130, 246, 0.7);
            filter: brightness(1.1);
        }
        .btn-secondary-custom {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.3s ease;
        }
        .btn-secondary-custom:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="container-box">
        <!-- Logo Area -->
        <div class="flex justify-center mb-6 animate-float flex-shrink-0">
            <img src="assets/logo-twins.png" alt="Twins Logo" class="hero-logo w-48 md:w-64 h-auto" onerror="this.style.display='none'">
        </div>

        <div class="content-side w-full">
            <div class="text-center mb-6 landscape:text-left">
                <h1 class="text-3xl md:text-4xl font-black text-white mb-2 tracking-tight italic drop-shadow-xl">ULTRAMAN <span class="text-blue-400">x</span> MELODY</h1>
                <div class="h-1 w-20 bg-blue-500 mx-auto landscape:mx-0 rounded-full mb-3 shadow-[0_0_15px_rgba(59,130,246,0.8)]"></div>
                <p class="text-white font-bold tracking-[0.2em] uppercase opacity-90 text-xs md:text-sm">Heroes Adventure</p>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col gap-3 mb-8">
                <a href="main2.html" class="btn-primary text-white text-center py-4 md:py-5 rounded-2xl font-black text-lg md:text-xl tracking-wide uppercase">
                    Start Mission
                </a>
                <a href="history.html" class="btn-secondary-custom text-white text-center py-3 md:py-4 rounded-2xl font-bold text-xs tracking-widest uppercase">
                    Battle History
                </a>
            </div>

            <!-- Recent Games Preview -->
            <div class="glass-card p-5 w-full">
                <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-2">
                    <h3 class="text-[10px] font-black text-white/70 tracking-widest uppercase">Recent Missions</h3>
                    <div class="flex gap-1">
                        <div class="w-1.5 h-1.5 rounded-full bg-blue-500 shadow-[0_0_8px_#3b82f6]"></div>
                        <div class="w-1.5 h-1.5 rounded-full bg-pink-500 shadow-[0_0_8px_#ec4899]"></div>
                    </div>
                </div>
                
                <div id="preview-content" class="space-y-1">
                    <div class="text-center py-4 text-white/50 text-sm italic">No missions completed yet</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/history.js"></script>
    <script>
        (function() {
            var records = loadHistory();
            var container = document.getElementById('preview-content');
            if (!records || records.length === 0) return;

            var html = '';
            var shown = records.slice(0, 3);
            for (var i = 0; i < shown.length; i++) {
                var r = shown[i];
                var winnerText = '';
                var winnerColor = 'text-white/60';
                
                if (r.winner === 'ultraman') {
                    winnerText = '⚡ WIN';
                    winnerColor = 'text-blue-300 font-black';
                } else if (r.winner === 'melody') {
                    winnerText = '🌸 WIN';
                    winnerColor = 'text-pink-300 font-black';
                } else {
                    winnerText = 'DRAW';
                }

                html += '<div class="flex justify-between items-center py-3 border-b border-white/5 last:border-0">' +
                    '<div class="flex flex-col">' +
                        '<span class="text-[10px] font-bold text-white/40 uppercase tracking-tighter">' + formatTimestamp(r.timestamp) + '</span>' +
                        '<div class="flex items-center gap-2 mt-0.5">' +
                            '<span class="text-blue-300 font-black text-sm">U' + r.s1 + '</span>' +
                            '<span class="text-white/20 text-xs">-</span>' +
                            '<span class="text-pink-300 font-black text-sm">M' + r.s2 + '</span>' +
                        '</div>' +
                    '</div>' +
                    '<span class="text-[9px] font-black px-2.5 py-1 rounded-full bg-white/10 ' + winnerColor + ' border border-white/10">' + winnerText + '</span>' +
                '</div>';
            }
            container.innerHTML = html;
        })();
    </script>
</body>
</html>
