
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { background: #0b0e14; color: #e2e8f0; font-family: sans-serif; }
        .prose h1 { color: #38bdf8; font-size: 1.5rem; border-left: 4px solid #38bdf8; padding-left: 1rem; margin-bottom: 2rem; }
        .prose h2 { color: #38bdf8; font-size: 1.25rem; border-bottom: 1px solid rgba(56, 189, 248, 0.2); padding-bottom: 0.5rem; margin-top: 3rem; }
        .prose blockquote { border-left: 4px solid #fbbf24; background: rgba(251, 191, 36, 0.05); padding: 1rem; color: #fbbf24; margin: 1.5rem 0; }
        .prose blockquote p::before { content: "⚡ 小杰觀測點評："; font-weight: bold; }
        .prose a { color: #38bdf8; text-decoration: underline; }
        .prose li { margin-bottom: 1rem; }
        .prose strong { color: #fff; }
    </style>
</head>
<body class="p-10 prose prose-invert max-w-none">
    <h2>TEST</h2>
<p>This is a test file.</p>
</body>
</html>
