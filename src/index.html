<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Platform | 雲端要塞</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0e14; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .portal-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .portal-card:hover { transform: translateY(-5px); border-color: rgba(56, 189, 248, 0.5); background: rgba(56, 189, 248, 0.1); }
        .hero-logo {
            filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.6));
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .group:hover .hero-logo { transform: scale(1.08) rotate(2deg); }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">
    <div class="text-center mb-12">
        <h1 class="text-5xl font-black italic tracking-tighter text-white mb-4">AI-AGENT CLOUD</h1>
        <p class="text-slate-500 uppercase tracking-[0.3em] text-xs">Connecting Data with Reality</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl">
        <!-- 門戶 1: 早報 -->
        <a href="/news/index.html" class="portal-card glass p-10 rounded-[2.5rem] flex flex-col items-center text-center group">
            <span class="text-6xl mb-6 group-hover:scale-110 transition-transform">📰</span>
            <h2 class="text-2xl font-bold text-white mb-2">Daily News Portal</h2>
            <p class="text-slate-500 text-sm">每日科技情報與 AI 觀測點評</p>
        </a>

        <!-- 門戶 2: 遊戲 -->
        <a href="./games/menu.html" class="portal-card glass p-10 rounded-[2.5rem] flex flex-col items-center text-center group border-2 border-transparent">
            <div class="flex justify-center mb-6 animate-float">
                <img src="./assets/logo.png" alt="Kids Hero Logo" class="hero-logo w-30 md:w-36 h-auto" onerror="this.style.display='none'">
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">Kids Hero Play</h2>
            <p class="text-slate-500 text-sm">專為兒童打造的英雄互動樂園</p>
        </a>
    </div>

    <div class="mt-16 text-[10px] text-slate-600 font-mono tracking-widest uppercase">
        System Node: Online | Secure Dimension Established
    </div>
</body>
</html>
