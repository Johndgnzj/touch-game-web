<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRAMAN x MELODY: HEROES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: #000; color: white; }
        .hidden { display: none !important; }
        #game-area { 
            position: fixed; 
            inset: 0; 
            z-index: 10; 
            pointer-events: auto; 
            background-size: cover; 
            background-position: center center;
            background-repeat: no-repeat;
        }
        /* 響應式背景切換 */
        @media (orientation: portrait) {
            #game-area { background-image: url('../assets/background-portrait.jpg'); }
        }
        @media (orientation: landscape) {
            #game-area { background-image: url('../assets/background-landscape.jpg'); }
        }
        .falling-item { position: absolute; width: 80px; height: 80px; pointer-events: none; z-index: 20; transition: transform 0.1s linear; }
        .btn { background: #3b82f6; color: white; padding: 15px 40px; border-radius: 50px; font-weight: bold; margin: 10px; cursor: pointer; }
        .ui { position: fixed; top: 0; left: 0; width: 100%; z-index: 50; display: flex; justify-content: space-between; padding: 20px; pointer-events: none; }
        .stat { background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="welcome" class="screen">
        <h1 class="text-4xl font-bold mb-8">HEROES ADVENTURE</h1>
        <div onclick="start()" class="btn">START GAME</div>
    </div>

    <div id="game-ui" class="ui hidden">
        <div class="stat text-blue-400">U: <span id="s1">0</span></div>
        <div class="stat text-white font-bold" id="tm">30</div>
        <div class="stat text-pink-400">M: <span id="s2">0</span></div>
    </div>

    <div id="game-area" class="hidden"></div>

    <div id="result" class="screen hidden">
        <h1 class="text-3xl font-bold mb-8 text-yellow-400">GAME OVER</h1>
        <div class="flex gap-8 mb-8">
            <div class="text-center">
                <img src="../assets/ultraman.jpg" class="w-20 h-20 rounded mb-2" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=u'">
                <p id="f1" class="text-3xl font-bold">0</p>
            </div>
            <div class="text-center">
                <img src="../assets/melody.jpg" class="w-20 h-20 rounded mb-2" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=m'">
                <p id="f2" class="text-3xl font-bold">0</p>
            </div>
        </div>
        <div onclick="location.reload()" class="btn">RESTART</div>
    </div>

    <script>
        let s1 = 0, s2 = 0, tm = 30, active = false;
        const area = document.getElementById('game-area');

        function start() {
            document.getElementById('welcome').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            area.classList.remove('hidden');
            active = true;
            
            const timer = setInterval(() => {
                tm--;
                document.getElementById('tm').innerText = tm;
                if(tm <= 0) {
                    clearInterval(timer);
                    end();
                }
            }, 1000);

            setInterval(() => {
                if(active) spawn();
            }, 700);
        }

        function spawn() {
            const isU = Math.random() > 0.5;
            const div = document.createElement('img');
            div.src = isU ? '../assets/ultraman.jpg' : '../assets/melody.jpg';
            div.onerror = () => { div.src = ''; div.style.fontSize = '60px'; div.innerText = isU ? '👾' : '🍓'; };
            div.className = 'falling-item';
            const x = Math.random() * (window.innerWidth - 80);
            div.style.left = x + 'px';
            div.style.top = '-100px';
            area.appendChild(div);

            let pos = -100;
            const speed = 3 + Math.random() * 4;
            const move = setInterval(() => {
                if(!active) { clearInterval(move); div.remove(); return; }
                pos += speed;
                div.style.top = pos + 'px';
                if(pos > window.innerHeight) {
                    clearInterval(move);
                    div.remove();
                }
            }, 20);

            // Click handling directly on area to be safe
        }

        area.addEventListener('touchstart', (e) => {
            if(!active) return;
            const t = e.touches[0];
            handleHit(t.clientX, t.clientY);
        });
        area.addEventListener('mousedown', (e) => {
            if(!active) return;
            handleHit(e.clientX, e.clientY);
        });

        function handleHit(tx, ty) {
            const items = document.getElementsByClassName('falling-item');
            for(let i=0; i<items.length; i++) {
                const item = items[i];
                const r = item.getBoundingClientRect();
                if(tx > r.left - 20 && tx < r.right + 20 && ty > r.top - 20 && ty < r.bottom + 20) {
                    if(item.src.includes('ultraman')) s1++; else s2++;
                    document.getElementById('s1').innerText = s1;
                    document.getElementById('s2').innerText = s2;
                    item.remove();
                    break;
                }
            }
        }

        function end() {
            active = false;
            document.getElementById('game-area').classList.add('hidden');
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            document.getElementById('f1').innerText = s1;
            document.getElementById('f2').innerText = s2;
        }
    </script>
</body>
</html>
