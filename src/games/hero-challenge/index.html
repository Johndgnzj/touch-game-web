<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小英雄遊戲樂園 | Kids Hero Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #1a1a2e; color: white; overflow: hidden; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        .bg-gradient-custom { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .game-card { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .game-card:active { transform: scale(0.95); }
        /* 雙人面對面佈局 */
        .dual-container { display: flex; flex-direction: column; height: 100vh; }
        .player-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .p2-zone { transform: rotate(180deg); border-bottom: 2px dashed rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div id="hub-container" class="dual-container">
        <div class="player-zone p2-zone bg-gradient-custom">
            <h2 class="text-2xl font-black mb-4">準備好了嗎？</h2>
            <div class="flex gap-4">
                <div class="bg-white/10 p-4 rounded-2xl border border-white/20">
                    <p class="text-xs uppercase opacity-50">你的紀錄</p>
                    <p class="text-xl font-bold p2-score">尚無冒險</p>
                </div>
            </div>
        </div>

        <div class="player-zone p1-zone bg-[#0f0f1a]">
            <div class="text-center mb-6">
                <h1 class="text-4xl font-black italic tracking-tighter mb-2">小英雄遊戲樂園</h1>
                <p class="text-xs opacity-50 uppercase tracking-widest">Kids Hero Playground</p>
            </div>
            
            <div class="grid grid-cols-2 gap-4 w-full max-w-md px-6">
                <a href="welcome.html" class="game-card bg-blue-600 p-4 rounded-3xl flex flex-col items-center shadow-lg border-b-4 border-blue-800">
                    <span class="text-4xl mb-2">⚡</span>
                    <span class="font-bold text-sm">英雄挑戰</span>
                </a>
                <div class="game-card bg-gray-800 p-4 rounded-3xl flex flex-col items-center opacity-50 cursor-not-allowed">
                    <span class="text-4xl mb-2">🍎</span>
                    <span class="font-bold text-sm">即將開啟</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
