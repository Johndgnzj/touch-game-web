<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mission Select | Kids Hero Hub</title>
    <link rel="icon" type="image/png" href="../assets/games_icon_logo.png">
    <link rel="shortcut icon" type="image/png" href="../assets/games_icon_logo.png">
    <link rel="apple-touch-icon" href="../assets/games_icon_logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/games_icon_logo.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#060611">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hero Play">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #060611;
            --bg-panel:    #0b0f1e;
            --accent-blue: #3b82f6;
            --accent-cyan: #22d3ee;
            --accent-pink: #ec4899;
            --accent-gold: #fbbf24;
            --accent-green: #22c55e;
            --text:        #ffffff;
            --muted:       rgba(255, 255, 255, 0.55);
            --subtle:      rgba(255, 255, 255, 0.3);
        }
        * { -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'M PLUS Rounded 1c', sans-serif; overflow-x: hidden; }
        .font-en { font-family: 'Bungee', sans-serif; }
        .nebula { position: fixed; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 80% 50% at 20% 0%, rgba(59, 130, 246, 0.22), transparent 60%), radial-gradient(ellipse 60% 40% at 90% 100%, rgba(236, 72, 153, 0.15), transparent 55%); }
        .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: radial-gradient(1px 1px at 13% 27%, rgba(255,255,255,0.9), transparent), radial-gradient(1.5px 1.5px at 58% 73%, rgba(255,255,255,0.9), transparent); background-size: 100% 100%; animation: twinkle 6s ease-in-out infinite alternate; }
        @keyframes twinkle { from { opacity: 0.7; } to { opacity: 1; } }
        .grid-overlay { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 56px 56px; mask-image: radial-gradient(ellipse at center, black 35%, transparent 78%); }
        .back-btn { position: fixed; top: 20px; left: 20px; z-index: 50; display: inline-flex; align-items: center; gap: 10px; padding: 10px 18px; border-radius: 999px; background: rgba(255,255,255,0.04); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); color: var(--muted); text-decoration: none; font-size: 11px; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; }
        .back-btn::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent-blue); box-shadow: 0 0 8px var(--accent-blue); }
        .page-title { font-family: 'Bungee', sans-serif; background: linear-gradient(135deg, #ffffff 0%, #c7d2fe 55%, #94a3b8 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .game-card { position: relative; display: block; border-radius: 28px; isolation: isolate; text-decoration: none; color: inherit; transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1); background: rgba(11, 15, 30, 0.8); backdrop-filter: blur(22px); border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .game-card:hover { transform: translateY(-6px) scale(1.015); border-color: rgba(255,255,255,0.3); }
        .card-hero { border-color: rgba(59, 130, 246, 0.35); }
        .card-fruit { border-color: rgba(34, 197, 94, 0.35); }
        .portrait { width: 88px; height: 88px; border-radius: 50%; object-fit: cover; border: 3px solid; box-shadow: 0 10px 28px rgba(0,0,0,0.5); }
        .portrait-u { border-color: #3b82f6; background: #1e3a8a; transform: rotate(-6deg); }
        .portrait-m { border-color: #ffffff; background: #ffffff; transform: rotate(6deg) translateY(10px); }
        .hero-logo {
            filter: drop-shadow(0 0 26px rgba(59, 130, 246, 0.55));
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .game-card:hover .hero-logo { transform: scale(1.06) rotate(2deg); }
        @keyframes heroFloat {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-8px); }
        }
        .animate-float { animation: heroFloat 4s ease-in-out infinite; }
        .fruit-icon { width: 100px; height: 100px; object-fit: contain; filter: drop-shadow(0 0 15px rgba(34, 197, 94, 0.5)); }
        .status-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: 999px; font-family: 'Bungee', sans-serif; font-size: 9px; letter-spacing: 0.22em; background: rgba(251, 191, 36, 0.14); color: var(--accent-gold); border: 1px solid rgba(251, 191, 36, 0.35); }
        .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-gold); box-shadow: 0 0 10px var(--accent-gold); animation: blink 1.4s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .cta-play { display: inline-flex; align-items: center; gap: 8px; padding: 9px 18px; border-radius: 999px; background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: #0b0b0b; font-family: 'Bungee', sans-serif; font-size: 12px; letter-spacing: 0.12em; box-shadow: 0 8px 22px -6px rgba(251, 191, 36, 0.7); }
        @keyframes riseIn { from { opacity: 0; transform: translateY(26px); } to { opacity: 1; transform: translateY(0); } }
        .reveal { animation: riseIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) both; }
    </style>
</head>
<body>
    <div class="nebula"></div>
    <div class="stars"></div>
    <div class="grid-overlay"></div>

    <a href="../index.html" class="back-btn"><span>Back to HQ</span></a>

    <main class="relative z-10 min-h-screen flex flex-col items-center justify-center px-5 py-24">
        <header class="text-center w-full max-w-3xl mb-12">
            <h1 class="page-title text-5xl md:text-6xl font-black leading-none reveal">MISSION SELECT</h1>
            <p class="text-white/55 mt-4 tracking-wider reveal" style="animation-delay: 0.2s">挑一場英雄任務開始今日冒險</p>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl">
            <!-- 任務 1: 英雄挑戰 -->
            <a href="./hero-challenge/welcome.html" class="game-card card-hero p-7 reveal" style="animation-delay: 0.4s">
                <div class="flex justify-between mb-5">
                    <span class="status-badge"><span class="dot"></span>LIVE</span>
                    <span class="font-en text-[10px] text-white/40">MSN · 01</span>
                </div>
                <div class="h-32 mb-5 flex items-center justify-center animate-float">
                    <img src="./hero-challenge/assets/background-intro.jpg" alt="Hero Challenge" class="hero-logo h-32 w-auto" onerror="this.style.display='none'">
                </div>
                <div>
                    <h2 class="text-2xl font-black">點點英雄大派對</h2>
                    <p class="font-en text-[10px] text-blue-300">HERO CHALLENGE</p>
                </div>
                <div class="flex justify-between items-center mt-6 pt-4 border-t border-white/10">
                    <span class="font-en text-[10px] text-white/40">2P / 30S / 6+</span>
                    <div class="cta-play">PLAY →</div>
                </div>
            </a>

            <!-- 任務 2: 水果捉迷藏 -->
            <a href="./fruit-hunt/welcome.html" class="game-card card-fruit p-7 reveal" style="animation-delay: 0.6s">
                <div class="flex justify-between mb-5">
                    <span class="status-badge"><span class="dot"></span>NEW</span>
                    <span class="font-en text-[10px] text-white/40">MSN · 02</span>
                </div>
                <div class="h-32 mb-5 flex items-center justify-center">
                    <img src="./fruit-hunt/assets/fruits/apple.png" class="fruit-icon">
                </div>
                <div>
                    <h2 class="text-2xl font-black">水果捉迷藏</h2>
                    <p class="font-en text-[10px] text-green-400">FRUIT HUNT ADVENTURE</p>
                </div>
                <div class="flex justify-between items-center mt-6 pt-4 border-t border-white/10">
                    <span class="font-en text-[10px] text-white/40">1-2P / 30-60S / 3+</span>
                    <div class="cta-play">PLAY →</div>
                </div>
            </a>
        </section>
    </main>
</body>
</html>
