<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fruit Hunt Adventure</title>
    <link rel="icon" type="image/png" href="../../assets/games_icon_logo.png">
    <link rel="shortcut icon" type="image/png" href="../../assets/games_icon_logo.png">
    <link rel="apple-touch-icon" href="../../assets/games_icon_logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../../assets/games_icon_logo.png">
    <link rel="manifest" href="../site.webmanifest">
    <meta name="theme-color" content="#060611">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hero Play">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #061106; margin:0; padding:0; overflow:hidden; touch-action:none; font-family: sans-serif; }
        .stage { position:relative; z-index:10; width:100vw; height:100vh; display:flex; flex-direction:column; }

        /* Per-player view */
        .player-view { position:relative; flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; }
        .player-view + .player-view { border-top: 2px dashed rgba(255,255,255,0.25); }
        .view-bg { position:absolute; inset:0; background: url('assets/background.jpg') center/cover; opacity: 0.6; z-index:0; }
        .p2-area { transform: rotate(180deg); }

        /* HUD */
        .hud { position:relative; z-index:2; height: 80px; background: rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:space-between; padding: 0 20px; border-bottom: 2px solid rgba(255,255,255,0.1); flex-shrink:0; }
        .target-card { background: rgba(255,255,255,0.1); border: 2px solid #fbbf24; padding: 5px 20px; border-radius: 15px; display:flex; align-items:center; gap: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .target-img { width: 40px; height: 40px; }
        .timer { font-family: 'JetBrains Mono'; font-size: 2rem; color: #fff; }
        .timer-danger { color: #ff4444 !important; animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px,1px); } 50% { transform: translate(-1px,-1px); } }
        .score { color: #fff; }

        /* Game area */
        .game-area { position:relative; z-index:1; flex:1; min-height:0; }
        .hole { position:absolute; background: url('assets/tree-hole.png') center/contain no-repeat; transform: translateX(-50%); }
        .fruit { position:absolute; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); transform: scale(0); cursor:pointer; }
        .fruit.pop { transform: scale(1); }
        .fruit img { width:100%; height:100%; object-fit:contain; pointer-events:none; }
        @keyframes wiggle { 0%,100% { transform: scale(1.2) rotate(-8deg);} 50% { transform: scale(1.2) rotate(8deg);} }
        .fruit.highlight { animation: wiggle 0.25s infinite; }

        /* Solo mode: HUD 放大 2 倍 */
        .solo-hud .hud { height: 160px; padding: 0 40px; }
        .solo-hud .target-card { padding: 10px 40px; gap: 20px; border-width: 3px; border-radius: 24px; }
        .solo-hud .target-card .text-xs { font-size: 1rem; }
        .solo-hud .target-img { width: 80px; height: 80px; }
        .solo-hud .target-name { font-size: 2.25rem; }
        .solo-hud .timer { font-size: 4rem; }
        .solo-hud .score { font-size: 3rem; }

        #result { position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:200; display:none; flex-direction:column; align-items:center; justify-content:center; color:white; padding:20px; text-align:center; }
        .font-en { font-family: 'Bungee', sans-serif; }
        .duo-result { display:flex; gap:32px; margin-bottom:32px; flex-wrap:wrap; justify-content:center; }
        .player-card { padding:20px 36px; border:2px solid rgba(255,255,255,0.2); border-radius:16px; min-width:160px; }
        .player-card.winner { border-color:#fbbf24; background:rgba(251,191,36,0.1); }
        .player-label { font-size:1rem; letter-spacing:0.2em; opacity:0.7; }
        .player-score { font-size:3.5rem; font-weight:900; }

        /* ===== Preloader / Tap to Start ===== */
        #preloader {
            position: fixed; inset: 0; z-index: 2000;
            background: #050510;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 28px;
            transition: opacity 0.5s ease;
        }
        #preloader.done { opacity: 0; pointer-events: none; }
        .preloader-title {
            font-size: clamp(1.6rem, 5vw, 2.6rem);
            font-weight: 900; letter-spacing: 0.08em; color: #fff;
            text-shadow: 0 0 30px rgba(96,165,250,0.45);
        }
        .preloader-bar-wrap {
            width: min(80vw, 360px); height: 10px;
            background: rgba(255,255,255,0.08);
            border-radius: 999px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.12);
        }
        .preloader-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #22c55e, #fbbf24);
            transition: width 0.2s ease;
        }
        .preloader-text {
            font-size: 0.95rem; color: rgba(255,255,255,0.7);
            letter-spacing: 0.18em;
        }
        .tap-start-btn {
            padding: 18px 52px; border-radius: 999px; border: none;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #0b0b0b; font-weight: 900; font-size: clamp(1.1rem, 3.2vw, 1.5rem);
            letter-spacing: 0.22em; cursor: pointer;
            box-shadow: 0 12px 32px rgba(251,191,36,0.4), 0 0 0 0 rgba(251,191,36,0.6);
            animation: tapPulse 1.5s ease-in-out infinite;
            font-family: inherit;
            -webkit-tap-highlight-color: transparent;
        }
        @keyframes tapPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 12px 32px rgba(251,191,36,0.4), 0 0 0 0 rgba(251,191,36,0.55); }
            50%      { transform: scale(1.06); box-shadow: 0 16px 40px rgba(251,191,36,0.55), 0 0 0 18px rgba(251,191,36,0); }
        }
        .tap-start-hint {
            font-size: 0.85rem; letter-spacing: 0.25em;
            color: rgba(255,255,255,0.55); text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="preloader-title">Fruit Hunt Adventure</div>
        <div class="preloader-bar-wrap"><div id="preloaderBar" class="preloader-bar"></div></div>
        <div class="preloader-text">載入中… <span id="preloadPct">0</span>%</div>
    </div>

    <div class="stage" id="main-stage"></div>

    <div id="result">
        <h1 class="text-5xl font-black mb-8 text-amber-400 italic font-en">MISSION COMPLETE</h1>
        <div id="result-body"></div>
        <div class="flex gap-6">
            <button onclick="location.reload()" class="px-8 py-4 bg-green-600 rounded-2xl font-black text-xl font-en">RESTART</button>
            <a href="../menu.html" class="px-8 py-4 bg-slate-700 rounded-2xl font-black text-xl font-en">MENU</a>
        </div>
    </div>

    <script src="../../common/js/history.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'solo';
        const level = urlParams.get('level') || 'easy';
        const timeLimit = parseInt(urlParams.get('time')) || 30;

        const fruits = [
            { name: 'APPLE', img: 'apple.png' },
            { name: 'BANANA', img: 'banana.png' },
            { name: 'STRAWBERRY', img: 'strawberry.png' },
            { name: 'GRAPE', img: 'grape.png' },
            { name: 'WATERMELON', img: 'watermelon.png' },
            { name: 'PINEAPPLE', img: 'pineapple.png' },
            { name: 'ORANGE', img: 'orange.png' },
            { name: 'PEAR', img: 'pear.png' },
            { name: 'LEMON', img: 'lemon.png' },
            { name: 'CHERRY', img: 'cherry.png' },
            { name: 'BLUEBERRY', img: 'blueberry.png' }
        ];

        const HOLE_ASPECT = 80 / 120; // height / width, preserves original proportions
        const HOLE_COUNT = level === 'easy' ? 3 : 5;

        let timer = timeLimit, active = false, currentTarget = null;
        const views = [];
        const stage = document.getElementById('main-stage');
        const hitSfx = new Audio('assets/sfx/hit.mp3');
        const bgm = new Audio('assets/sfx/bgm.mp3'); bgm.loop = true;

        // ===== Audio unlock (must be called from a user gesture on this page) =====
        let audioUnlocked = false;
        function unlockAudio() {
            if (audioUnlocked) return;
            audioUnlocked = true;
            try {
                hitSfx.play().then(() => { hitSfx.pause(); hitSfx.currentTime = 0; }).catch(() => {});
            } catch (e) {}
            bgm.currentTime = 0;
            bgm.play().catch(() => {});
        }

        function buildView(isP2) {
            const root = document.createElement('div');
            root.className = 'player-view' + (isP2 ? ' p2-area' : '') + (mode === 'solo' ? ' solo-hud' : '');
            root.innerHTML = `
                <div class="view-bg"></div>
                <div class="hud">
                    <div class="timer">${timeLimit}</div>
                    <div class="target-card">
                        <span class="text-xs text-amber-400 font-bold uppercase tracking-widest">Target</span>
                        <img class="target-img" src="">
                        <span class="target-name font-en text-lg">APPLE</span>
                    </div>
                    <div class="score text-2xl font-black">0</div>
                </div>
                <div class="game-area"></div>
            `;
            stage.appendChild(root);
            return {
                root,
                gameArea: root.querySelector('.game-area'),
                timerEl: root.querySelector('.timer'),
                targetImg: root.querySelector('.target-img'),
                targetName: root.querySelector('.target-name'),
                scoreEl: root.querySelector('.score'),
                holes: [],
                score: 0,
                holeSize: null
            };
        }

        function computeHoleSize(areaEl) {
            const w = areaEl.clientWidth || window.innerWidth;
            const h = areaEl.clientHeight || window.innerHeight;
            const scale = mode === 'solo' ? 2 : 1;
            let holeWidth = Math.min(180 * scale, Math.max(60 * scale, (w / (HOLE_COUNT + 1)) * 0.8 * scale));
            const hCap = mode === 'solo' ? 0.7 : 0.45;
            holeWidth = Math.min(holeWidth, (h * hCap) / HOLE_ASPECT);
            const holeHeight = holeWidth * HOLE_ASPECT;
            const fruitSize = holeWidth * HOLE_ASPECT;
            return { holeWidth, holeHeight, fruitSize };
        }

        function applyFruitPosition(fruit, size, holeWidth, holeHeight) {
            fruit.style.width = size + 'px';
            fruit.style.height = size + 'px';
            fruit.style.left = ((holeWidth - size) / 2) + 'px';
            fruit.style.bottom = (holeHeight * 0.25) + 'px';
        }

        function applySizesToView(view) {
            const { holeWidth, holeHeight, fruitSize } = computeHoleSize(view.gameArea);
            view.holeSize = { holeWidth, holeHeight, fruitSize };
            view.holes.forEach(hole => {
                hole.style.width = holeWidth + 'px';
                hole.style.height = holeHeight + 'px';
                const fruit = hole.querySelector('.fruit');
                if (fruit) applyFruitPosition(fruit, fruitSize, holeWidth, holeHeight);
            });
        }

        function spawnHoles(view) {
            for (let i = 0; i < HOLE_COUNT; i++) {
                const hole = document.createElement('div');
                hole.className = 'hole';
                hole.style.left = (100 / (HOLE_COUNT + 1) * (i + 1)) + '%';
                hole.style.top = (30 + Math.random() * 40) + '%';
                view.gameArea.appendChild(hole);
                view.holes.push(hole);
            }
            applySizesToView(view);
        }

        function clearViewFruits(view) {
            view.holes.forEach(hole => {
                const f = hole.querySelector('.fruit');
                if (f) f.remove();
            });
        }

        function popFruit(hole, view, fruitData) {
            if (hole.querySelector('.fruit')) return;
            const fruit = document.createElement('div');
            fruit.className = 'fruit';
            fruit.innerHTML = `<img src="assets/fruits/${fruitData.img}">`;
            fruit.dataset.name = fruitData.name;
            const { holeWidth, holeHeight, fruitSize } = view.holeSize || computeHoleSize(view.gameArea);
            applyFruitPosition(fruit, fruitSize, holeWidth, holeHeight);
            hole.appendChild(fruit);

            setTimeout(() => fruit.classList.add('pop'), 50);

            // 3 秒後，若此顆為目標水果，放大 20% 並搖晃
            setTimeout(() => {
                if (!active) return;
                if (!fruit.parentNode) return;
                if (currentTarget && fruit.dataset.name === currentTarget.name) {
                    fruit.classList.add('highlight');
                }
            }, 3000);

            fruit.onclick = () => {
                if (!active) return;
                if (fruit.dataset.name === currentTarget.name) {
                    view.score++;
                    view.scoreEl.innerText = view.score;
                    hitSfx.currentTime = 0;
                    hitSfx.play().catch(e => {});
                    fruit.classList.remove('highlight');
                    fruit.style.transform = 'scale(1.5)';
                    fruit.style.opacity = '0';
                    startRound();
                } else {
                    fruit.style.animation = 'none';
                    // force reflow so shake restarts
                    void fruit.offsetWidth;
                    fruit.style.animation = 'shake 0.1s 3';
                }
            };
        }

        function refillHoles(view) {
            clearViewFruits(view);
            if (view.holes.length === 0) return;
            const correctIdx = Math.floor(Math.random() * view.holes.length);
            const distractors = fruits.filter(f => f.name !== currentTarget.name);
            view.holes.forEach((hole, i) => {
                const data = (i === correctIdx)
                    ? currentTarget
                    : distractors[Math.floor(Math.random() * distractors.length)];
                popFruit(hole, view, data);
            });
        }

        function newTarget() {
            const pool = currentTarget
                ? fruits.filter(f => f.name !== currentTarget.name)
                : fruits;
            currentTarget = pool[Math.floor(Math.random() * pool.length)];
            views.forEach(v => {
                v.targetImg.src = `assets/fruits/${currentTarget.img}`;
                v.targetName.innerText = currentTarget.name;
            });
        }

        function startRound() {
            newTarget();
            views.forEach(refillHoles);
        }

        function startTimer() {
            const itv = setInterval(() => {
                timer--;
                views.forEach(v => {
                    v.timerEl.innerText = timer;
                    if (timer <= 5) v.timerEl.classList.add('timer-danger');
                });
                if (timer <= 0) {
                    clearInterval(itv);
                    active = false;
                    bgm.pause();
                    showResult();
                }
            }, 1000);
        }

        function showResult() {
            const resultBody = document.getElementById('result-body');
            document.getElementById('result').style.display = 'flex';
            if (mode === 'duo' && views.length === 2) {
                const s1 = views[0].score, s2 = views[1].score;
                let label = 'DRAW';
                if (s1 > s2) label = 'P1 WINS';
                else if (s2 > s1) label = 'P2 WINS';
                resultBody.innerHTML = `
                    <div class="text-3xl font-black mb-6 font-en text-amber-400">${label}</div>
                    <div class="duo-result">
                        <div class="player-card ${s1 >= s2 ? 'winner' : ''}">
                            <div class="player-label font-en">PLAYER 1</div>
                            <div class="player-score">${s1}</div>
                        </div>
                        <div class="player-card ${s2 >= s1 ? 'winner' : ''}">
                            <div class="player-label font-en">PLAYER 2</div>
                            <div class="player-score">${s2}</div>
                        </div>
                    </div>
                `;
                saveRecord({ game: 'fruit-hunt', score: Math.max(s1, s2) });
            } else {
                const s = views[0].score;
                resultBody.innerHTML = `<div class="text-6xl font-black mb-12">${s}</div>`;
                saveRecord({ game: 'fruit-hunt', score: s });
            }
        }

        function init() {
            active = true;
            if (mode === 'duo') {
                views.push(buildView(true));   // 上半，旋轉 180° 面向上方玩家
                views.push(buildView(false));  // 下半，正向面向下方玩家
            } else {
                views.push(buildView(false));
            }
            views.forEach(spawnHoles);
            startRound();
            startTimer();
            window.addEventListener('resize', () => views.forEach(applySizesToView));
        }

        // ===== Asset preload =====
        function preloadAssets(images, audios) {
            const total = images.length + audios.length;
            if (total === 0) return Promise.resolve();
            let loaded = 0;
            const barEl = document.getElementById('preloaderBar');
            const pctEl = document.getElementById('preloadPct');
            return new Promise(resolve => {
                let finished = false;
                function bump() {
                    if (finished) return;
                    loaded++;
                    const pct = Math.round(loaded / total * 100);
                    if (barEl) barEl.style.width = pct + '%';
                    if (pctEl) pctEl.textContent = pct;
                    if (loaded >= total) { finished = true; resolve(); }
                }
                images.forEach(src => {
                    const img = new Image();
                    img.onload = bump; img.onerror = bump;
                    img.src = src;
                });
                audios.forEach(src => {
                    const a = new Audio();
                    let done = false;
                    const once = () => { if (done) return; done = true; bump(); };
                    a.addEventListener('canplaythrough', once, { once: true });
                    a.addEventListener('loadeddata', once, { once: true });
                    a.addEventListener('error', once, { once: true });
                    a.preload = 'auto';
                    a.src = src;
                });
                setTimeout(() => { if (!finished) { finished = true; resolve(); } }, 10000);
            });
        }

        function showTapToStart() {
            const pre = document.getElementById('preloader');
            if (!pre) { unlockAudio(); init(); return; }
            pre.innerHTML =
                '<div class="preloader-title">Fruit Hunt Adventure</div>' +
                '<button id="tapStartBtn" class="tap-start-btn">TAP TO START</button>' +
                '<div class="tap-start-hint">點一下開始遊戲</div>';
            const btn = document.getElementById('tapStartBtn');
            let started = false;
            function begin(ev) {
                if (started) return;
                started = true;
                if (ev) { ev.preventDefault(); ev.stopPropagation(); }
                unlockAudio();
                pre.classList.add('done');
                setTimeout(() => { pre.style.display = 'none'; }, 500);
                init();
            }
            btn.addEventListener('touchstart', begin, { passive: false });
            btn.addEventListener('click', begin);
        }

        window.onload = () => {
            const imgList = [
                'assets/background.jpg',
                'assets/tree-hole.png',
                ...fruits.map(f => 'assets/fruits/' + f.img)
            ];
            const audioList = [
                'assets/sfx/bgm.mp3',
                'assets/sfx/hit.mp3'
            ];
            preloadAssets(imgList, audioList).then(showTapToStart);
        };
    </script>
</body>
</html>
