<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fruit Hunt Adventure | Briefing</title>
    <link rel="icon" type="image/png" href="../../assets/games_icon_logo.png">
    <link rel="shortcut icon" type="image/png" href="../../assets/games_icon_logo.png">
    <link rel="apple-touch-icon" href="../../assets/games_icon_logo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="../../assets/games_icon_logo.png">
    <link rel="manifest" href="../site.webmanifest">
    <meta name="theme-color" content="#060611">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hero Play">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=JetBrains+Mono:wght@500;700&family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:          #061106;
            --bg-panel:    #0f1e0b;
            --accent-green: #22c55e;
            --accent-cyan: #22d3ee;
            --accent-gold: #fbbf24;
            --text:        #ffffff;
            --muted:       rgba(255, 255, 255, 0.55);
            --subtle:      rgba(255, 255, 255, 0.3);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: 'M PLUS Rounded 1c', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        .font-en   { font-family: 'Bungee', system-ui, sans-serif; letter-spacing: 0.02em; }
        .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

        .nebula {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 70% 50% at 15% 10%, rgba(34, 197, 94, 0.28), transparent 60%),
                radial-gradient(ellipse 60% 45% at 85% 90%, rgba(251, 191, 36, 0.22), transparent 55%),
                radial-gradient(ellipse 40% 30% at 50% 50%, rgba(34, 211, 238, 0.08), transparent 60%);
        }
        .stars {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                radial-gradient(1px 1px at 11% 23%, rgba(255,255,255,0.85), transparent),
                radial-gradient(2px 2px at 23% 47%, rgba(187,247,208,0.55), transparent),
                radial-gradient(2px 2px at 69% 32%, rgba(254,243,199,0.50), transparent);
            background-size: 600px 600px, 900px 900px, 1050px 1050px;
            animation: drift 120s linear infinite;
        }
        @keyframes drift {
            0%   { background-position: 0 0, 0 0, 0 0; }
            100% { background-position: -600px 600px, 900px -900px, -1050px 1050px; }
        }

        .grid-overlay {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(to right,  rgba(255,255,255,0.035) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.035) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse 75% 70% at 50% 50%, black 35%, transparent 85%);
        }

        .stage {
            position: relative; z-index: 10;
            min-height: 100vh;
            padding: 24px 20px 40px;
            display: flex; flex-direction: column;
            max-width: 1200px; margin: 0 auto;
        }

        .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 10px 16px; border-radius: 999px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
            color: var(--text); font-size: 0.7rem; letter-spacing: 0.08em;
            backdrop-filter: blur(12px); transition: all 0.25s ease; text-decoration: none;
        }
        .back-btn:hover { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.45); }
        .back-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 10px var(--accent-green); }

        .hud-tag {
            padding: 8px 14px; border-radius: 6px; background: rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.08); color: var(--muted); font-size: 0.7rem; letter-spacing: 0.18em;
        }

        .title-block { text-align: center; margin: 10px 0 28px; }
        .overtitle { font-size: 0.72rem; letter-spacing: 0.45em; text-transform: uppercase; color: var(--muted); display: inline-flex; align-items: center; gap: 14px; margin-bottom: 18px; }
        .title-main { font-size: clamp(2rem, 6vw, 3.6rem); line-height: 1; color: #fff; text-shadow: 0 0 40px rgba(34,197,94,0.35); }
        .title-sub { margin-top: 12px; font-size: 0.85rem; color: var(--muted); letter-spacing: 0.22em; text-transform: uppercase; }

        .panel {
            position: relative; padding: 24px 22px 22px; border-radius: 24px;
            background: linear-gradient(180deg, rgba(17,30,12,0.75), rgba(10,22,7,0.55));
            border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(14px); margin-bottom: 18px;
        }
        .panel-label { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .panel-label .key { font-size: 0.72rem; letter-spacing: 0.2em; color: var(--muted); display: flex; align-items: center; gap: 8px; }
        .panel-label .key::before { content: ''; width: 8px; height: 8px; background: var(--accent-gold); clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%); }

        .choice-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .choice-grid.three-cols { grid-template-columns: repeat(3, 1fr); }
        
        .choice-option {
            padding: 16px 8px; border-radius: 16px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08); cursor: pointer; transition: all 0.25s ease; text-align: center;
        }
        .choice-option.active {
            background: rgba(34,197,94,0.15); border-color: var(--accent-green); box-shadow: 0 10px 20px rgba(34,197,94,0.2);
        }
        .choice-option .val { font-size: 1.1rem; font-weight: 900; display: block; color: #fff; }
        .choice-option .sub { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

        .launch-btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 14px;
            padding: 20px 48px; border-radius: 20px; background: linear-gradient(180deg, #fde68a, #fbbf24 50%, #d97706);
            color: #3b1409; font-family: 'Bungee', sans-serif; font-size: 1.3rem; letter-spacing: 0.1em;
            text-decoration: none; box-shadow: 0 15px 35px rgba(251,191,36,0.3); transition: transform 0.2s;
        }
        .launch-btn:hover { transform: scale(1.05); }

        .rules { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 24px; }
        .rule { padding: 12px; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); text-align: center; }
        .rule .ico { font-size: 1.2rem; display: block; margin-bottom: 4px; }
        .rule .t { font-size: 0.65rem; color: #fff; font-weight: 700; }

        .reveal { opacity: 0; transform: translateY(14px); animation: rise 0.8s ease-out forwards; }
        .d-1 { animation-delay: 0.1s; } .d-2 { animation-delay: 0.2s; }
        @keyframes rise { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="nebula"></div>
    <div class="stars"></div>
    <div class="grid-overlay"></div>

    <div class="stage">
        <div class="topbar reveal d-1">
            <a href="../menu.html" class="back-btn"><span class="back-dot"></span><span class="font-en">BACK TO MISSIONS</span></a>
            <div class="hud-tag font-mono">[ FOREST · 02 ]</div>
        </div>

        <div class="title-block reveal d-1">
            <div class="overtitle font-en">Mission Briefing</div>
            <h1 class="title-main font-en">READY TO HUNT</h1>
            <div class="title-sub">水果捉迷藏 · Fruit Hunt Adventure</div>
        </div>

        <div class="panel reveal d-2">
            <div class="panel-label"><div class="key font-en">Game Mode</div></div>
            <div class="choice-grid" id="modeGrid">
                <div class="choice-option active" data-val="solo"><span class="val font-en">SOLO 🧒</span><span class="sub">單人冒險</span></div>
                <div class="choice-option" data-val="duo"><span class="val font-en">DUO 🧒🧒</span><span class="sub">雙人挑戰</span></div>
            </div>
        </div>

        <div class="panel reveal d-2">
            <div class="panel-label"><div class="key font-en">Difficulty</div></div>
            <div class="choice-grid" id="levelGrid">
                <div class="choice-option active" data-val="easy"><span class="val font-en">EASY 3🌳</span><span class="sub">簡單模式</span></div>
                <div class="choice-option" data-val="hard"><span class="val font-en">HARD 5🌳</span><span class="sub">困難模式</span></div>
            </div>
        </div>

        <div class="panel reveal d-2">
            <div class="panel-label"><div class="key font-en">Match Length</div></div>
            <div class="choice-grid three-cols" id="timeGrid">
                <div class="choice-option" data-val="30"><span class="val font-en">30</span><span class="sub">Sprint</span></div>
                <div class="choice-option active" data-val="45"><span class="val font-en">45</span><span class="sub">Standard</span></div>
                <div class="choice-option" data-val="60"><span class="val font-en">60</span><span class="sub">Marathon</span></div>
            </div>
        </div>

        <div class="text-center mt-6 reveal d-2">
            <a id="launchBtn" href="play.html?mode=solo&level=easy&time=45" class="launch-btn">ENTER FOREST ➜</a>
        </div>

        <div class="rules reveal d-2">
            <div class="rule"><span class="ico">🍎</span><div class="t">TAP THE TARGET</div></div>
            <div class="rule"><span class="ico">🔥</span><div class="t">CHAIN COMBOS</div></div>
            <div class="rule"><span class="ico">🎊</span><div class="t">FRUIT PARTY</div></div>
        </div>
    </div>

    <script>
        var params = { mode: 'solo', level: 'easy', time: '45' };
        function update() {
            document.getElementById('launchBtn').href = 'play.html?mode=' + params.mode + '&level=' + params.level + '&time=' + params.time;
        }
        function bind(gridId, key) {
            var grid = document.getElementById(gridId);
            grid.addEventListener('click', function(e) {
                var opt = e.target.closest('.choice-option');
                if(!opt) return;
                grid.querySelectorAll('.choice-option').forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
                params[key] = opt.dataset.val;
                update();
            });
        }
        bind('modeGrid', 'mode'); bind('levelGrid', 'level'); bind('timeGrid', 'time');
    </script>
</body>
</html>
