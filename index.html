<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRAMAN x MELODY: HEROES</title>
    <link rel="stylesheet" href="css/tailwind.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }
        .hero-logo {
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.5));
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .hero-logo:hover {
            transform: scale(1.05) rotate(2deg);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            box-shadow: 0 8px 20px -6px rgba(59, 130, 246, 0.6);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px -5px rgba(59, 130, 246, 0.7);
            filter: brightness(1.1);
        }
        .btn-secondary-custom {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .btn-secondary-custom:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="screen w-full max-w-lg">
        <!-- Logo Area -->
        <div class="flex justify-center mb-6 animate-float">
            <img src="assets/logo-twins.png" alt="Twins Logo" class="hero-logo w-64 h-auto" onerror="this.style.display='none'">
        </div>

        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-white mb-2 tracking-tight italic">ULTRAMAN <span class="text-blue-400">x</span> MELODY</h1>
            <div class="h-1 w-20 bg-blue-500 mx-auto rounded-full mb-3"></div>
            <p class="text-slate-400 text-sm font-bold tracking-[0.2em] uppercase">Heroes Adventure</p>
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col gap-4 mb-12">
            <a href="main.html" class="btn-primary text-white text-center py-5 rounded-2xl font-black text-xl tracking-wide uppercase">
                Start Mission
            </a>
            <a href="history.html" class="btn-secondary-custom text-white text-center py-4 rounded-2xl font-bold text-sm tracking-widest uppercase">
                Battle History
            </a>
        </div>

        <!-- Recent Games Preview -->
        <div class="glass-card p-6 w-full">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-black text-slate-500 tracking-widest uppercase">Recent Missions</h3>
                <div class="flex gap-1">
                    <div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-pink-500"></div>
                </div>
            </div>
            
            <div id="preview-content" class="space-y-1">
                <div class="text-center py-4 text-slate-500 text-sm italic">No missions completed yet</div>
            </div>
        </div>
    </div>

    <script src="js/history.js"></script>
    <script>
        (function() {
            var records = loadHistory();
            var container = document.getElementById('preview-content');
            if (!records || records.length === 0) return;

            var html = '';
            var shown = records.slice(0, 3);
            for (var i = 0; i < shown.length; i++) {
                var r = shown[i];
                var winnerText = '';
                var winnerColor = 'text-slate-400';
                
                if (r.winner === 'ultraman') {
                    winnerText = '⚡ WIN';
                    winnerColor = 'text-blue-400';
                } else if (r.winner === 'melody') {
                    winnerText = '🌸 WIN';
                    winnerColor = 'text-pink-400';
                } else {
                    winnerText = 'DRAW';
                }

                html += '<div class="flex justify-between items-center py-3 border-b border-white/5 last:border-0">' +
                    '<div class="flex flex-col">' +
                        '<span class="text-xs font-bold text-slate-500 uppercase tracking-tighter">' + formatTimestamp(r.timestamp) + '</span>' +
                        '<div class="flex items-center gap-2 mt-0.5">' +
                            '<span class="text-blue-400 font-black text-sm">U' + r.s1 + '</span>' +
                            '<span class="text-slate-600 text-xs">-</span>' +
                            '<span class="text-pink-400 font-black text-sm">M' + r.s2 + '</span>' +
                        '</div>' +
                    '</div>' +
                    '<span class="text-[10px] font-black px-2.5 py-1 rounded-full bg-white/5 ' + winnerColor + ' border border-white/5">' + winnerText + '</span>' +
                '</div>';
            }
            container.innerHTML = html;
        })();
    </script>
</body>
</html>
